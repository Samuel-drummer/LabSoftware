<!DOCTYPE html>git
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Cadastro</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        form { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #6C63FF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #5952D4; }
    </style>
</head>
<body>
    <form action="/enviar-cadastro" method="POST">
        <h2>Cadastro</h2>
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        <div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>
        </div>
        <button type="submit">Cadastrar</button>
    </form>
</body>
</html>
