<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container"> 
    <h2 style="color: white;">Calculadora de IMC</h2>
    <h2 style="color: white;">Veja seu IMC!</h2>
    <label for="peso">Peso (kg):</label>
    <input type="number" id="peso" step="0.1" placeholder="Digite aqui seu peso em Kg: Ex: Pão de queijo " required>
    
    <label for="altura">Altura (m):</label>
    <input type="number" id="altura" step="0.01" placeholder="Digite aqui seu peso em Kg: Ex: Pão de queijo " required>
    
    <button onclick="calcularIMC()">Calcular</button>
    
    <p id="resultado" style="color: white;"></p>
</div>

<script src="calcular.js">
</script>

</body>
</html>
